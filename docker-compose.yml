version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: llw_webinar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llw_webinar
      POSTGRES_USER: llw_admin
      POSTGRES_PASSWORD: llw_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  postgres_data:
