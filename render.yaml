services:
  - type: web
    name: webinar-classroom
    runtime: node
    plan: standard
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: node server/webinar-server.mjs
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: GOOGLE_SHEETS_AS_PRIMARY_DB
        value: true
      - key: GOOGLE_SHEETS_WEB_APP_URL
        value: https://script.google.com/macros/s/AKfycbzSnSEociIsfEUnuvysPzrjBsiB8pRQwKMBt2I5yHfx7afBGBWDFH3jfCE1OYD0DbQI/exec
      - key: GOOGLE_SHEETS_SYNC_TIMEOUT_MS
        value: 20000
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PYMD_API_KEY
        sync: false
      - key: PYMD_DOMAIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LIVEKIT_URL
        value: wss://livekit.187.127.155.86.sslip.io
      - key: LIVEKIT_API_KEY
        value: myapp
      - key: LIVEKIT_API_SECRET
        value: c58c9e8f6ff32981cf52387e850002f216464d95fff37bc452df3baa188ff3a7
      - key: DATABASE_SSL
        value: true
      - key: REQUIRE_DATABASE_PERSISTENCE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: llw-admin-db
          property: connectionString
      - key: DATA_FILE
        value: /var/data/app-data.json
      - key: DATA_BACKUP_DIR
        value: /var/data/backups
      - key: RESET_TEAM_FROM_GIT_ON_STARTUP
        value: true
      - key: RESET_TEAM_FROM_GIT_TOKEN
        value: 2026-05-09-admin-access-repair

databases:
  - name: llw-admin-db
    plan: basic-256mb
    databaseName: llw_admin
    user: llw_admin
