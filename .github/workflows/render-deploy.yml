name: Deploy To Render

on:
  push:
  workflow_dispatch:

concurrency:
  group: render-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/')
    steps:
      - name: Validate deploy hook secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub repository secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Render deploy for this commit
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying branch $GITHUB_REF_NAME at commit $GITHUB_SHA"
          curl --fail --show-error --silent --request POST \
            "${RENDER_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"

